<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shiv Shakti Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    
    <div class="marquee">
      <div class="shiv-text">
        
        
        <marquee behavior="scroll" direction="left">ॐ नमः शिवाय</marquee>
        
      </div>
    </div>

    <div>
        <img id="img" src="https://m.media-amazon.com/images/I/61qbMx4oXJL._AC_UF1000,1000_QL80_.jpg" alt="not found ">
    </div>

    <div class="popping-text">shivya</div>

    

    <div class="mantra">
      ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम्। उर्वारुकमिव
      बन्धनान्मृत्योर्मुक्षीय मामृतात्।।
    </div>

   
    <audio
      id="shiv-audio"
      src="audio/shiv_mantra.mp3"
      loop
      preload="auto"
    ></audio>
       

   
    <div class="audio-control" id="audio-control" hidden>
      <button id="play-toggle">Play Mantra</button>
    </div>

    

    

  <a href="form.html" class="form-btn">Please fill this form</a>
  </body>
</html>
