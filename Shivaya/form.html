<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>
</head>
<body>
    <form action="/post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="DOB">DOB:</label>
        <input type="date" id="DOB" name="DOB"><br><br>

    <label>List of subjects:</label><br>
    <input type="checkbox" id="cse" name="subjects" value="CSE">
    <label for="cse">CSE</label><br>
    
    <input type="checkbox" id="js" name="subjects" value="JS">
    <label for="js">JS</label><br>
    
    <input type="checkbox" id="java" name="subjects" value="Java">
    <label for="java">Java</label><br>
    
    <input type="checkbox" id="dbms" name="subjects" value="DBMS">
    <label for="dbms">DBMS</label><br><br>

        <input type="submit" value="Submit">
    </form>

    
</body>
</html>
