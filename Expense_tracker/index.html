<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Finance Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💰 Personal Finance Tracker</h1>
      <div class="balance" id="balance">Rs0.00</div>
    </div>

    <div class="form-section">
      <div class="input-group">
        <input type="text" id="description" placeholder="Description (e.g., Grocery)">
        <input type="number" id="amount" placeholder="Amount" step="0.01">
        <select id="type">
          <option value="income">+ Income</option>
          <option value="expense">- Expense</option>
        </select>
        <button onclick="addTransaction()">Add Transaction</button>
      </div>
    </div>

    <div class="transactions">
      <h2>📊 Transaction History</h2>
      <div class="summary">
        <div class="summary-card">
          <h3>Total Income</h3>
          <div class="summary-number" id="totalIncome">Rs0.00</div>
        </div>
        <div class="summary-card">
          <h3>Total Expense</h3>
          <div class="summary-number" id="totalExpense">Rs.0.00</div>
        </div>
        <div class="summary-card">
          <h3>Net Balance</h3>
          <div class="summary-number" id="netBalance">Rs0.00</div>
        </div>
      </div>
      
      <div id="transactionsList"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
